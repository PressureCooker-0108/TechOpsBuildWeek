<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotaract team</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="team-page">
   <!-- Ambient decorative background: soft orbs + rotating gears. -->
  <div class="ambient-bg" aria-hidden="true">
    <span class="ambient-bg__orb ambient-bg__orb--one"></span>
    <span class="ambient-bg__orb ambient-bg__orb--two"></span>
    <img class="ambient-bg__gear-img ambient-bg__gear-img--one" src="./assets/gear-placeholder.svg" alt="" data-scroll-gear data-rotate-speed="0.12" />
    <img class="ambient-bg__gear-img ambient-bg__gear-img--two" src="./assets/gear-placeholder.svg" alt="" data-scroll-gear data-rotate-speed="0.09" />
    <img class="ambient-bg__gear-img ambient-bg__gear-img--three" src="./assets/gear-placeholder.svg" alt="" data-scroll-gear data-rotate-speed="0.07" />
  </div>

  <!-- Top navigation for the public team page. -->
  <nav class="navbar">
    <div class="brand">Rotaract Club of WCE Sangli</div>
    <div class="nav-links">
      <a href="./index.html" class="active">Team</a>
    </div>
  </nav>

  <!-- Hero header introducing the directory. -->
  <header class="hero">
    <p class="eyebrow">Rotaract Team Directory</p>
    <h1>Meet the Team</h1>
    <p>Discover our Rotaractors, their posts, and what they bring to the team.</p>
  </header>

  <!-- Small stat cards are rendered here via JavaScript. -->
  <section class="stats" id="stats"></section>

  <!-- Search and board filter controls. -->
  <section class="controls">
    <input id="searchInput" type="text" placeholder="Search by name or board" aria-label="Search Rotaractors" />

    <div class="filter-row">
      <select id="boardFilter" aria-label="Filter by board">
        <option value="">All Boards</option>
      </select>
    </div>
  </section>


  <!-- Team list and state containers managed by script.js. -->
  <section id="loadingState" class="loading">Loading Rotaractors...</section>
  <section id="memberGrid" class="member-grid"></section>
  <section id="emptyState" class="empty hidden">No Rotaractors match your search/filter.</section>

  <!-- Full profile modal opened when a member card is clicked. -->
  <div id="profileModal" class="profile-modal hidden" aria-hidden="true">
    <div class="profile-modal__backdrop" data-modal-close></div>
    <div class="profile-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="profileName">
      <button type="button" class="profile-modal__close" id="modalCloseBtn" aria-label="Close profile">×</button>
      <img id="modalAvatar" class="profile-modal__avatar" src="https://ui-avatars.com/api/?name=Rotaractor&size=600&rounded=true&bold=true&background=2b2b2f&color=f3dc97&format=png" alt="Member avatar" />
      <div class="profile-modal__content">
        <p id="modalPost" class="profile-modal__post"></p>
        <h2 id="profileName"></h2>
        <p id="modalBoard" class="profile-modal__meta"></p>
        <div class="profile-modal__section">
          <h3>Social Badges</h3>
          <div id="modalBadges" class="profile-badge-grid"></div>
        </div>
        <div class="profile-modal__section">
          <h3>Introduction</h3>
          <p id="modalIntro" class="profile-modal__text"></p>
        </div>
        <div class="profile-modal__section">
          <h3>Achievements</h3>
          <div id="modalAchievements" class="profile-list-grid"></div>
        </div>
        <div class="profile-modal__section">
          <h3>Project Gallery</h3>
          <div id="modalProjects" class="profile-list-grid"></div>
        </div>
        <blockquote id="modalQuote" class="profile-modal__quote"></blockquote>
        <div id="modalSkills" class="skill-tags"></div>
        <p id="modalWork" class="profile-modal__work"></p>
      </div>
    </div>
  </div>

  <!-- Closing section to give the page a clear ending. -->
  <footer class="page-ending">
    <p class="page-ending__line">Learning is our precept</p>
  </footer>

  <div id="toast" class="toast hidden"></div>

  <script src="./script.js"></script>
</body>
</html>
