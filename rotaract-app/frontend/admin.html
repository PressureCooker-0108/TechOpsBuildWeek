<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rotaract Admin Panel</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="admin-gated">
  <!-- Top navigation (admin link is intentionally not exposed from team page). -->
  <nav class="navbar">
    <div class="brand">Rotaract Club of WCE Sangli</div>
    <div class="nav-links">
      <a href="./index.html">Team</a>
    </div>
  </nav>

  <!-- Main admin workspace: left side form, right side member table. -->
  <main class="admin-layout">
    <!-- Member editor form used for create + update actions. -->
    <section class="admin-card">
      <h1>Admin Panel</h1>
      <p class="admin-note">Use this panel to add, edit, and delete Rotaractor records.</p>

      <!-- Password gate for admin-only mutations (add/edit/delete). -->
      <div class="admin-auth">
        <label for="adminPassword">Admin Password</label>
        <input id="adminPassword" type="password" placeholder="Enter admin password" autocomplete="current-password" />
        <button type="button" id="unlockAdminBtn">Unlock Admin Panel</button>
        <p id="authStatus" class="auth-status">Locked. Enter the admin password to enable add/edit/delete actions.</p>
      </div>

      <!-- Form fields map directly to backend member payload fields. -->
      <form id="memberForm" class="member-form">
        <input id="memberId" type="hidden" />

        <label for="name">Rotaractor Name</label>
        <input id="name" placeholder="e.g. Aarav Mehta" required />

        <label for="role">Post</label>
        <input id="role" required />

        <label for="department">Department</label>
        <input id="department" required />

        <label for="board">Board</label>
        <input id="board" placeholder="e.g. FE Board / SE Board / TE Board" />

        <label for="linkedin">LinkedIn</label>
        <input id="linkedin" type="url" placeholder="https://linkedin.com/in/username" />

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="name@rotaract.org" />

        <label for="avatar">Avatar URL</label>
        <input id="avatar" type="url" placeholder="https://example.com/photo.jpg" />
        <label for="avatarUpload">Or Upload Avatar</label>
        <input id="avatarUpload" type="file" accept="image/*" />
        <div class="avatar-manager">
          <img id="avatarPreview" class="avatar-preview hidden" src="https://ui-avatars.com/api/?name=Rotaractor&size=128&rounded=true&bold=true&background=2b2b2f&color=f3dc97&format=png" alt="Avatar preview" />
          <button type="button" id="clearAvatarBtn" class="outline">Clear Avatar</button>
        </div>

        <label for="quote">Quote</label>
        <textarea id="quote" rows="3" placeholder="Short quote about the member"></textarea>

        <label for="intro">Brief Introduction</label>
        <textarea id="intro" rows="3" placeholder="Short introduction about the member"></textarea>

        <label for="achievements">Achievements</label>
        <textarea id="achievements" rows="3" placeholder="Mention key achievements"></textarea>

        <label for="projects">Project Highlights</label>
        <textarea id="projects" rows="3" placeholder="Comma-separated highlights, e.g. Fundraiser, Blood Donation Drive"></textarea>

        <label for="skills">Skills</label>
        <textarea id="skills" rows="3" placeholder="Comma-separated skills, e.g. Leadership, Design, Communication"></textarea>

        <label for="work">Work / Description</label>
        <textarea id="work" rows="4" placeholder="Describe the member's responsibilities and contribution"></textarea>

        <div class="form-actions">
          <button type="submit" id="saveBtn">Save Member</button>
          <button type="button" id="cancelEditBtn" class="outline">Cancel Edit</button>
        </div>
      </form>
    </section>

    <!-- Live table of all members for quick edit/delete actions. -->
    <section class="admin-card">
      <h2>Rotaractors</h2>
      <p class="admin-note">Edit or remove records directly from this list.</p>
      <div id="adminLoading" class="loading">Loading Rotaractors...</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Post</th>
              <th>Board</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Shared toast for transient status messages. -->
  <div id="toast" class="toast hidden"></div>

  <!-- Shared JavaScript contains both team and admin page logic. -->
  <script src="./script.js"></script>
</body>
</html>
